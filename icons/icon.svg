    <circle cx="160" cy="130" r="12"/>
  </g>
  <!-- text -->
  <text x="256" y="400" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="900" font-size="56" fill="white" letter-spacing="2">PhD</text>
